name: Run blocks

on:
  workflow_dispatch:

jobs:
  # Block 1: Confluence_Input
  Confluence_Input:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

  # Block 2: Test (depends on Confluence_Input)
  ARXML_difference:
    runs-on: ubuntu-latest
    needs: Confluence_Input
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

  # Block 3: Deploy (depends on test)
  Config_check:
    runs-on: ubuntu-latest
    needs: ARXML_difference
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
