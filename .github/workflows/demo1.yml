- hosts: localhost
  gather_facts: false
  tasks:
    - name: Get current date
      set_fact:
        today: "{{ now(fmt='%Y-%m-%d') | to_datetime('%Y-%m-%d') }}"

    - name: Calculate start of week (Monday)
      set_fact:
        week_start: "{{ (today - ((today.strftime('%w') | int - 1) | int) | community.general.to_datetime('%Y-%m-%d')) }}"

    - name: Calculate end of week (Sunday)
      set_fact:
        week_end: "{{ (week_start + 6) }}"

    - debug:
        msg: "Week starts on {{ week_start.strftime('%Y-%m-%d') }} and ends on {{ week_end.strftime('%Y-%m-%d') }}"
