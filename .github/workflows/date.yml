name: Run blocks

on:
  workflow_dispatch:

jobs:
  # Block 1: Confluence_Input
  tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Get today's date as datetime
        set_fact:
          today: "{{ ansible_date_time.date | to_datetime('%Y-%m-%d') }}"

      - name: Get weekday number (Mon=1..Sun=7)
        set_fact:
          weekday: "{{ today | strftime('%u') | int }}"

      - name: Calculate start of week (Monday)
        set_fact:
          week_start: "{{ (today - (weekday - 1)) | strftime('%Y-%m-%d') }}"

      - name: Calculate end of week (Sunday)
        set_fact:
          week_end: "{{ (today - (weekday - 1) + 6) | strftime('%Y-%m-%d') }}"

      - name: Show week range
        debug:
          msg: "Week starts on {{ week_start }} and ends on {{ week_end }}"
